# Supabase local project config for InfluenceHub.
project_id = "influencehub"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# OAuth (Google) — fill in secrets via env to enable.
[auth.external.google]
enabled = false
client_id = ""
secret = ""

[realtime]
enabled = true

[storage]
enabled = true

# ── Edge functions ───────────────────────────────────────────────────────────
[functions.process-subscription]
verify_jwt = true
[functions.stripe-webhook]
verify_jwt = false
[functions.payme-webhook]
verify_jwt = false
[functions.onboard-influencer]
verify_jwt = true
[functions.claim-influencer]
verify_jwt = true
[functions.fetch-social-stats]
verify_jwt = false
[functions.process-scraping-queue]
verify_jwt = false
[functions.discover-influencers]
verify_jwt = false
[functions.send-magic-link]
verify_jwt = false
