<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff3399" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts: load async so the stylesheet never render-blocks (FCP). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- Avatars + data are served from Supabase Storage; warm the connection early -->
    <link rel="preconnect" href="https://ceqpcuhguxjdbzuuwamr.supabase.co" crossorigin />
    <link rel="preconnect" href="https://unavatar.io" crossorigin />

    <title>InfluenceHub — Influencer Marketplace</title>
    <meta
      name="description"
      content="InfluenceHub is an influencer marketplace where brands discover ranked Uzbek creators, unlock contacts and pricing, run campaigns, collect bids, and manage deals with real-time chat."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="InfluenceHub" />
    <meta property="og:url" content="https://famic.vercel.app/" />
    <meta property="og:title" content="InfluenceHub — Influencer Marketplace" />
    <meta
      property="og:description"
      content="Discover ranked Uzbek creators, run campaigns, and close deals with real-time chat."
    />
    <meta property="og:image" content="https://famic.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="InfluenceHub — Influencer Marketplace for Central Asia" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InfluenceHub — Influencer Marketplace" />
    <meta
      name="twitter:description"
      content="Discover ranked Uzbek creators, run campaigns, and close deals with real-time chat."
    />
    <meta name="twitter:image" content="https://famic.vercel.app/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "InfluenceHub",
        "url": "https://famic.vercel.app",
        "logo": "https://famic.vercel.app/favicon.svg",
        "description": "The Influencer Marketplace for Central Asia",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "InfluenceHub",
        "url": "https://famic.vercel.app",
        "description": "Discover ranked Uzbek creators, run campaigns, and close deals with real-time chat."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
